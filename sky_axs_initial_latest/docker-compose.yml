version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: sky_axs_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: core/api/Dockerfile
    image: sky_axs_api
    container_name: sky_axs_api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: core/worker/Dockerfile
    image: sky_axs_worker
    container_name: sky_axs_worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  orchestrator:
    build:
      context: .
      dockerfile: core/orchestrator/Dockerfile
    image: sky_axs_orchestrator
    container_name: sky_axs_orchestrator
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
      - worker
    restart: unless-stopped

  metrics_collector:
    build:
      context: .
      dockerfile: core/metrics_collector/Dockerfile
    image: sky_axs_metrics
    container_name: sky_axs_metrics
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_URL=http://api:8000/health
      - INTERVAL=10
      - STREAM_KEY=metrics
    depends_on:
      - redis
      - api
    restart: unless-stopped

volumes:
  redis_data: