version: '3.8'
services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    image: sky_axs_initial-sandbox:latest
    environment:
      - AXS_RESULTS_DIR=/app/data/results
    volumes:
      - ./data:/app/data
    networks:
      - default

networks:
  default:
    external: true
