version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: sky_axs_initial-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

  legacy:
    image: sky_axs_initial-legacy
    container_name: sky_axs_initial-legacy
    command: ["sleep", "infinity"]
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    image: sky_axs_initial-worker
    container_name: sky_axs_initial-worker
    command: rq worker -u redis://redis:6379 default

  orchestrator:
    image: sky_axs_initial-orchestrator
    container_name: sky_axs_initial-orchestrator
    command: sleep infinity
    depends_on:
      - redis
    restart: unless-stopped

 api:
   image: sky_axs_final:latest
   container_name: sky_axs_initial-api
   environment:
     - REDIS_HOST=redis
     - REDIS_PORT=6379
     - RQ_QUEUE=default
     - PORT=8081
   depends_on:
     - redis
     - worker
   ports: 
     - "8081:8081"
   restart: unless-stopped

   volumes:
     redis_data:
