version: '3.8'

services:
  mobile-api:
    build:
      context: .
      dockerfile: core/mobile/Dockerfile
    image: sky_axs_initial-mobile-api
    container_name: sky_axs_initial-mobile-api
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./data:/app/data
    ports:
      - "8084:8084"
    networks:
      - default

  mobile-worker:
    build:
      context: .
      dockerfile: core/mobile/Dockerfile.worker
    image: sky_axs_initial-mobile-worker
    container_name: sky_axs_initial-mobile-worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./data:/app/data
    command: ["python", "core/mobile/worker.py"]
    networks:
      - default

networks:
  default:
    external: true
    name: sky_axs_initial_default
